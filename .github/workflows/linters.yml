name: Linters

on:
  push:
  pull_request:

jobs:
  rubocop:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@master
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Run Rubocop
        run: bundle exec rubocop --color