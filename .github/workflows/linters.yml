name: Linters

on: pull_request

jobs:
  rubocop:
    name: Rubocop
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Ruby
        uses: ruby/setup-ruby@v2
        with:
          ruby-version: 3.4
          bundler-cache: true
      - name: Run Rubocop
        run: bundle exec rubocop --color
