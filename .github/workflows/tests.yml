name: Tests

on: pull_request

jobs:
  rspec:
    name: RSpec
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Ruby
        uses: ruby/setup-ruby@v2
        with:
          ruby-version: 3.4
          bundler-cache: true
      - name: Run RSpec
        run: bundle exec rspec
